name: Build

on:
  workflow_dispatch: { }
  release:
    types: [ published ]
  workflow_run:
    workflows: [ "CI" ]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

jobs:
  build-desktop:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || github.event_name == 'release' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ ubuntu-latest, windows-latest ]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend

      - name: Upload AppImage
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: invent-ory-linux-appimage
          path: frontend/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload MSI installer
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: invent-ory-windows-exe
          path: frontend/src-tauri/target/release/bundle/msi/*.msi

  build-android:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || github.event_name == 'release' }}
    runs-on: ubuntu-latest
    name: Build - Android (apk)
    env:
      TAURI_ANDROID_KEYSTORE_BASE64: ${{ secrets.TAURI_ANDROID_KEYSTORE_BASE64 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Decode Keystore
        if: ${{ env.TAURI_ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.TAURI_ANDROID_KEYSTORE_BASE64 }}" | tr -d '\n' | base64 -d > ${{ github.workspace }}/frontend/keystore.jks

      - name: Build APK
        working-directory: ./frontend
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ env.TAURI_ANDROID_KEYSTORE_BASE64 != '' && github.workspace || '' }}${{ env.TAURI_ANDROID_KEYSTORE_BASE64 != '' && '/frontend/keystore.jks' || '' }}
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.TAURI_ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.TAURI_ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.TAURI_ANDROID_KEY_PASSWORD }}
        run: npx tauri android build --apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: invent-ory-android-apk
          path: |
            frontend/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
            frontend/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk

  attach-to-release:
    if: github.event_name == 'release'
    needs: [ build-desktop, build-android ]
    runs-on: ubuntu-latest
    steps:
      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: invent-ory-linux-appimage
          path: artifacts/linux

      - name: Download MSI installer
        uses: actions/download-artifact@v4
        with:
          name: invent-ory-windows-exe
          path: artifacts/windows

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: invent-ory-android-apk
          path: artifacts/android

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/**/*.AppImage
            artifacts/windows/**/*.msi
            artifacts/android/**/*.apk
